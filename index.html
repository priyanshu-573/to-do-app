<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To-Do App</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0e0e0e;
    color: #fff;
    display: flex;
    justify-content: center;
    padding: 40px 10px;
  }

  .app {
    width: 100%;
    max-width: 400px;
  }

  h1 {
    text-align: center;
    color: #c8f135;
  }

  .input-box {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
  }

  input {
    flex: 1;
    padding: 10px;
    border: none;
    outline: none;
    background: #1a1a1a;
    color: #fff;
  }

  button {
    background: #c8f135;
    border: none;
    padding: 10px;
    cursor: pointer;
    font-weight: bold;
  }

  ul {
    list-style: none;
    padding: 0;
    margin: 0;
  }

  li {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #1a1a1a;
    margin-bottom: 8px;
    padding: 10px;
    border-left: 3px solid transparent;
  }

  li:hover {
    border-left: 3px solid #c8f135;
  }

  .left {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .completed span {
    text-decoration: line-through;
    opacity: 0.6;
  }

  .delete {
    display: none;
    color: red;
    cursor: pointer;
  }

  li:hover .delete {
    display: block;
  }

  .filters {
    display: flex;
    justify-content: space-between;
    margin-top: 15px;
  }

  .filters button {
    flex: 1;
    margin: 2px;
    background: #1a1a1a;
    color: #fff;
  }

  .filters button.active {
    background: #c8f135;
    color: #000;
  }

  .footer {
    margin-top: 10px;
    display: flex;
    justify-content: space-between;
    font-size: 14px;
  }
</style>
</head>

<body>
<div class="app">
  <h1>To-Do</h1>

  <div class="input-box">
    <input id="taskInput" placeholder="Add task...">
    <button onclick="addTask()">Add</button>
  </div>

  <ul id="list"></ul>

  <div class="filters">
    <button onclick="setFilter(event,'all')" class="active">All</button>
    <button onclick="setFilter(event,'active')">Active</button>
    <button onclick="setFilter(event,'completed')">Done</button>
  </div>

  <div class="footer">
    <span id="counter"></span>
    <button onclick="clearCompleted()">Clear Completed</button>
  </div>
</div>

<script>
  let tasks = [];
  let filter = "all";

  const input = document.getElementById("taskInput");
  const list = document.getElementById("list");
  const counter = document.getElementById("counter");

  // 🔹 Load from LocalStorage
  const saved = localStorage.getItem("tasks");
  if (saved) {
    tasks = JSON.parse(saved);
  }

  function saveTasks() {
    localStorage.setItem("tasks", JSON.stringify(tasks));
  }

  input.addEventListener("keypress", e => {
    if (e.key === "Enter") addTask();
  });

  function addTask() {
    const text = input.value.trim();
    if (!text) return;

    tasks.push({ text, done: false });
    input.value = "";
    saveTasks();
    render();
  }

  function toggleTask(i) {
    tasks[i].done = !tasks[i].done;
    saveTasks();
    render();
  }

  function deleteTask(i) {
    tasks.splice(i, 1);
    saveTasks();
    render();
  }

  function setFilter(e, f) {
    filter = f;
    document.querySelectorAll(".filters button").forEach(btn =>
      btn.classList.remove("active")
    );
    e.target.classList.add("active");
    render();
  }

  function clearCompleted() {
    tasks = tasks.filter(t => !t.done);
    saveTasks();
    render();
  }

  function render() {
    list.innerHTML = "";

    let filtered = tasks.filter(t => {
      if (filter === "active") return !t.done;
      if (filter === "completed") return t.done;
      return true;
    });

    filtered.forEach((task, i) => {
      const li = document.createElement("li");
      if (task.done) li.classList.add("completed");

      li.innerHTML = `
        <div class="left">
          <input type="checkbox" ${task.done ? "checked" : ""} onclick="toggleTask(${i})">
          <span>${task.text}</span>
        </div>
        <span class="delete" onclick="deleteTask(${i})">✖</span>
      `;

      list.appendChild(li);
    });

    const activeCount = tasks.filter(t => !t.done).length;
    counter.textContent = `${activeCount} tasks left`;
  }

  render();
</script>
</body>
</html>
